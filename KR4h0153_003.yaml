body:
  text: 唐賢三昧集巻下刑部尚書王士禎編髙適寄孟五少府秋氣落窮巷離憂兼暮蟬後時已如此髙興亦徒然知君念淹泊憶我屢周旋征路見來雁歸人悲逺天平生各千里相望在貞堅酬裴主簿雨後睢陽北樓見贈之作暮霞照新晴歸雲猶相逐有懐晨昬暇想見登眺目問禮侍彤䄡題詩訪茅屋髙樓多古今陳事滿陵谷地久微子封臺餘孝王築徘徊顧霄漢豁逹俯川陸逺水對秋城長天向喬木公門何清淨列㦸森已肅不歎攜手稀恒思著鞭速終當拂羽翰輕舉隨鴻鵠同諸公登慈恩寺浮圖香界泯羣有浮圖豈諸相登臨駭孤髙披拂欣大壯言是羽翼生迥出虚空上頓疑身世别乃覺形神王宫闕皆户前山河盡簷向秋風昨夜至秦塞多清曠千里何蒼蒼五陵鬱相望盛時慙阮步末宦知周防輸效獨無因斯焉可遊放同薛司直諸公秋霽曲江俯見南山作南山鬱初霽曲江湛不流若臨瑤池前想望崑崙丘迴首見黛色眇然波上秋深沈俯崢嶸清淺延阻脩連潭萬木影插岸千巗幽杳靄信難測淵淪無暗投片雲對漁父獨鳥隨虚舟我心寄青霞世事慙白鷗得意在乗興忘懐非外求良辰自多暇欣與數子遊古大梁行古城莽蒼饒荆榛驅馬荒城愁殺人魏王宫殿盡禾黍信陵賓客隨灰塵憶昨雄都舊朝市軒車照耀歌鐘起軍容帶甲三十萬國步連營五千里全盛須臾那可論髙臺曲池無復存遺墟但有狐狸迹古地空餘草木根暮天揺落傷懐抱撫劍悲歌對秋草俠客猶傳朱亥名行人尚識夷門道白璧黄金萬户侯寳刀駿馬填山丘年代淒涼不可問往來唯見水東流邯鄲少年行邯鄲城南游俠子自矜生長邯鄲裏千場縱博家仍富幾處報讐身不死宅中歌笑日紛紛門外車馬如雲屯未知肝膽向誰是令人却憶平原君君不見今人交態薄黄金用盡還疎索以兹感歎辭舊遊更於時事無所求且與少年飲美酒往來射獵西山頭燕歌行漢家烟塵在東北漢將辭家破殘賊男兒本自重横行天子非常賜顔色摐金伐鼓下榆闗旌斾逶迤碣石間校尉羽書飛瀚海單于獵火照狼山山川蕭條極邊土胡騎憑陵雜風雨戰士軍前半死生美人帳下猶歌舞大漠窮秋塞草腓孤城落日鬬兵稀身當恩遇常輕敵力盡闗山未解圍鐵衣逺戍辛勤久玉筯應啼别離後少婦城南欲斷腸征人薊北空回首邊庭飄颻那可度絶域蒼茫何所有殺氣三時作陣雲寒聲一夜傳刁斗相看白刃雪紛紛死節從來豈顧勲君不見沙場征戰苦至今猶憶李將軍人日寄杜二拾遺人日題詩寄草堂遥憐故人思故鄉柳條弄色不忍見梅花滿枝空斷腸身在南蕃無所預心懐百憂復千慮今年人日空相憶明年人日知何處一卧東山三十春豈知書劍老風塵龍鍾還忝二千石愧爾東西南北人送渾將軍出塞將軍族貴兵且强漢家已是渾邪王子孫相承在朝野至今部曲燕支下控弦盡用陰山兒臨陣長騎大宛馬銀鞍玉勒繡蝥弧毎逐嫖姚破骨都李廣從來先將士衞青未肯學孫吳傳有沙場千萬騎昨日邊庭羽書至城頭畫角三四聲匣裏寳刀晝夜鳴意氣能甘萬里去辛勤動作一年行黄雲白草無前後朝建旌旄夕刁斗塞下應多俠少年闗西不見春楊柳從軍借問所從誰擊劍酣歌當此時逺别無輕繞朝䇿平戎早寄仲宣詩賦得還山吟送沈四山人還山吟天髙日暮寒山深送君還山識君心人生老大須恣意看君解作一生事山間偃仰無不至石泉淙淙若風雨桂花松子常滿地賣藥囊中應有錢還山服藥又長年白雲勸盡杯中物明月相隨何處眠眠時憶問醒時事夢魂可以相周旋途中寄徐録事落日風雨至秋天鴻鴈初離憂不堪比旅館復何如君乂幾時去我知音信疎空多篋中贈長見右軍書酬衞八雪中見寄季冬憶淇上落日歸山樊舊宅帶流水平田臨古村雪中望來信醉裏開衡門果得希代寳緘之那可論送馮判官碣石遼西地漁陽薊北天闗山唯一道雨雪盡三邊才子方為客將軍正渴賢遥知幕府下書記日翩翩自薊北歸驅馬薊門北北風邊馬哀蒼茫逺山口豁逹胡天開五將已深入前軍止半迴誰憐不得意長劍獨歸來夜别韋司士髙館張燈酒復清夜鐘殘月鴈歸聲只言啼鳥堪求侣無那春風欲送行黄河曲裏沙為岸白馬津邊柳向城莫怨他鄉暫離别知君到處有逢迎送李少府貶峽中王少府貶長沙嗟君此别意何如駐馬銜杯問謫居巫峽啼猿數行淚衡陽歸鴈幾封書青楓江上秋天逺白帝城邊古木疎聖代即今多雨露暫時分手莫躊躇哭單父梁少府開篋淚沾臆見君前日書夜臺猶寂寞疑是子雲居塞上聽吹笛雪淨胡天牧馬還月明羌笛戍樓間借問梅花何處落風吹一夜滿闗山岑參初至西虢官舎南池呈左右省及南宫諸故人黜官自西掖待罪臨下陽空積犬馬戀豈思鵷鷺行素多江湖意偶佐山水鄉滿院池月靜捲簾谿雨凉軒牕竹翠濕案牘荷花香白鳥上衣桁青苔生筆牀數公不可見一别盡相忘早年迷進退晚節悟行藏他日能相訪嵩南舊草堂秋夜宿仙遊寺南凉堂呈謙道人太乙連太白兩山知幾重路盤石門窄匹馬行才通日西到山寺林下逢支公昨夜山北時星星聞此鐘秦女去已久仙臺在中峰簫聲不可聞此地留遺蹤石潭積黛色每嵗投金龍亂流爭迅湍噴薄如雷風夜來聞清磬月出蒼山空空山滿清光水樹相玲瓏迴廊映密竹秋殿隠深松燈影落前谿夜宿水聲中愛兹林巒好結宇向谿東相識唯山僧鄰家一釣翁林晩栗初拆枝寒梨已紅物幽興易愜事勝趣彌濃願謝區中縁永依金人宫寄報乘輦客簪裾爾何容宿華陰東郭客舎憶閻防次舎山郭近解鞍鳴鐘時主人炊新粒行子充夜飢關月生首陽照見華陰祠蒼茫秋山晦蕭瑟寒松悲久從園廬别遂與朋知辭舊壑蘭杜晚歸軒今已遲鞏北秋興寄崔明允白露被梧桐𤣥蟬晝夜號秋風萬里動日暮黄雲髙君子佐休明小人事蓬蒿所適在魚鳥焉能狥錐刀孤舟向廣武一鳥歸成臯勝槩日相與思君心鬱陶終南雲際精舎㝷法澄上人不遇歸髙冠東潭石淙望秦嶺微雨作貽友人昨夜雲際宿旦從西峰回不見林中僧微雨潭上來諸峰皆青翠秦嶺獨不開石鼔有時鳴秦王安在哉東南雲開處突兀獮猴臺崕口懸瀑流半空白皚皚河嶽英靈無以上四句有水深斷山口吼沫相喧豗二句噴壁四時雨傍村終日雷北瞻長安道日夕生塵埃若訪張仲蔚衡門滿蒿萊送王大昌齡赴江寜對酒寂不語悵然悲送君明時不得用白首徒攻文澤國從一官滄波幾千里羣公滿天闕獨去過淮水舊家富春渚嘗憶卧江樓自聞君欲行頻望南徐州窮巷獨閉門寒燈靜深屋北風吹微雪抱被肯同宿君行到京口正是桃花時舟中饒孤興湖上多新詩潛虬且深蟠黄鵠舉未晚惜君青雲器努力加餐飯澧頭送蔣侯君住灃水北我家灃水西兩村辨喬木五里聞鳴鷄飲酒谿雨過彈棊山月低徒聞蔣生逕爾去誰相攜與髙適薛據登慈恩寺浮圖塔勢如湧出孤髙聳天宫登臨出世界磴道盤虚空突兀壓神州崢嶸如鬼工四角礙白日七層摩蒼穹下窺指髙鳥俯聽聞驚風連山若波濤奔凑似朝東青槐夾馳道宫館何玲瓏秋色從西來蒼然滿關中五陵北原上萬古青濛濛淨理了可悟勝因夙所宗誓將挂冠去覺道資無窮終南山雙峰草堂作斂跡歸山田息心謝時輩晝還草堂卧但與雙峰對興來恣佳遊事愜符勝槩著書髙窻下日夕見城内曩為世人誤遂負平生愛久與林壑辭及來松杉大偶兹精廬近數預名僧㑹有時逐樵漁盡日不冠帶崕口上新月石門破蒼靄色向羣木深光揺一潭碎緬懐鄭生谷頗憶嚴子瀨勝事猶可追斯人邈千載因假歸白閣西草堂雷聲傍太白雨在八九峰東望白閣雲半入紫閣松勝槩紛滿目衡門趣彌濃幸有數畆田得延二仲蹤早聞逹士語偶與心相通誤徇一微官還山愧塵容釣竿不復把野碓無人舂惆悵飛鳥盡南谿聞夜鐘楚夕旅泊古興獨鶴唳江月孤帆凌楚雲秋風冷蕭瑟蘆荻花紛紛忽思湘川老欲訪雲中君麒麟息悲鳴愁見豺虎羣暮秋山行疲馬卧長坂夕陽下通津山風吹空林颯颯如有人蒼旻霽凉雨石路無飛塵千念集暮節萬籟悲蕭晨鶗鴂昨夜鳴蕙草色已陳況在逺行客自然多苦辛白雪歌送武判官歸京北風捲地白草折胡天八月即飛雪忽如一夜春風來千樹萬樹梨花開散入珠簾濕羅幕狐裘不暖錦衾薄將軍角弓不得控都䕶鐵衣冷難著瀚海䦨干百丈冰愁雲慘淡萬里凝中軍置酒飲歸客胡琴琵琶與羌笛紛紛暮雪下轅門風掣紅旗凍不翻輪臺東門送君去去時雪滿天山路山迴路轉不見君雪上空留馬行處輪臺歌奉送封大夫出師西征輪臺城頭夜吹角輪臺城北旄頭落羽書昨夜過渠黎單于已在金山西戍樓西望烟塵黑漢兵屯在輪臺北上將擁旄西出征平明吹笛大軍行四邊伐鼓雪海湧三軍大呼陰山動虜塞兵氣連雲屯戰場白骨纒草根劍河風急雲片闊沙口石凍馬蹄脫亞相勤王甘苦辛誓將報主静邊塵古來青史誰不見今見功名勝古人走馬川行奉送出師西征君不見走馬川行雪海邊平沙莽莽黄入天輪臺九月風夜吼一川碎石大如斗隨風滿地石亂走匈奴草黄馬正肥金山西見烟塵飛漢家大將西出師將軍金甲夜不脫半夜軍行戈相撥風頭如刀面如割馬毛帶雪汗氣蒸五花連錢旋作冰幕中草檄硯水凝虜騎聞之應膽懾料知短兵不敢接車師西門佇獻捷函谷關歌送劉評事使關西君不見函谷關崩城毁壁至今在樹根草蔓遮古道空谷千年長不改寂寞無人空舊山聖朝無事不須關白馬公孫何處去青牛老人更不還蒼苔白骨空滿地月與古時長相似野花不省見行人山鳥何曾識關吏故人方乘使者車吾知郭丹却不如請君時憶關外客行到關西多致書胡笳歌送顔真卿使赴河隴君不聞胡笳聲最悲紫髯碧眼胡人吹吹之一曲猶未了愁殺樓蘭征戍兒涼秋八月蕭關道北風吹斷天山草崑崙山南月欲斜胡人向月吹胡笳胡笳怨兮將送君秦山遥望隴山雲邊城夜夜多愁夢向月胡笳誰喜聞與獨孤漸道别長句兼呈嚴八侍御輪臺客舎春草滿潁陽歸客腸堪斷窮荒絶漠鳥不飛萬磧千山夢猶嬾憐君白面一書生讀書千巻未成名五侯貴門脚不到數畝山田身自耕興來浪跡無逺近及至辭家憶鄉信無事垂鞭信馬頭西南幾欲窮天盡奉使三年獨未歸邊頭詞客舊來稀借問君來得幾日到家不覺換春衣髙齋清晝巻羅幕紗帽接䍦慵不著中酒朝眠日色髙彈棊夜半燈花落冰片髙堆金錯盤滿堂凜凜五月寒桂林蒲萄新吐蔓武城㓨蜜未可餐軍中置酒夜撾鼓錦筵紅燭月未午花門將軍善胡歌葉河蕃王能漢語知爾園林壓渭濱夫人堂上泣羅裙魚龍川北盤谿雨鳥鼠山西洮水雲臺中嚴公於我厚别後新詩滿人口自憐棄置天西頭因君為問相思否送費子歸武昌漢陽歸客悲秋草旅舍葉飛愁不掃秋來倍憶武昌魚夢著只在巴陵道曾隨上將過祈連離家十年恒在邊劍鋒可惜虚用盡馬蹄無事今已穿知君開館常愛客樗蒲百金毎一擲平生有錢將與久江上故園空四壁吾觀費子毛骨竒廣眉大口仍赤髭看君失路尚如此人生貴賤那得知髙秋八月歸南楚東門一壺聊出祖路指鳳凰山北雲衣沾鸚鵡洲邊雨勿歎蹉跎白髮新應須守道勿羞貧男兒何必戀妻子莫向江村老却人偃師東與韓樽同詣景雲暉上人即事山陰老僧解楞伽潁陽歸客逺相過烟深草濕昨夜雨雨後秋風渡漕河空山終日塵事少平郊逺見行人小尚書磧石黄昬鐘别駕渡頭一歸鳥衞節度赤驃馬歌君家赤驃畫不得一團旋風桃花色紅纓紫鞚珊瑚鞭玉鞍錦韉黄金勒請君鞁出看君騎尾長窣地如紅絲自矜諸馬皆不及却憶百金新買時香街紫陌鳳城内滿城見者誰不愛揚鞭驟急白汗流弄影行驕碧蹄碎紫髯胡雛金翦刀平明翦出三鬉髙櫪上看時獨意氣衆中牽出偏雄豪騎將獵向南山口城南狐兔不復有草頭一㸃疾如飛郤使蒼鷹翻向後憶昨看君朝未央鳴珂擁蓋滿路香始知邊將真富貴可憐人馬相輝光男兒稱意得如此駿馬長鳴北風起待君歸去掃胡塵為君一日行千里滻水東店送唐子歸嵩陽野店臨官路重城壓御堤山門灞水北雨過杜陵西歸夢秋能作鄉書醉嬾題橋回忽不見征馬尚聞嘶送鄭堪歸東京氾水别業客舎見青草忽聞思舊山看君灞陵去匹馬成臯還對酒風與雪向家河復關因悲宦遊子終嵗無時閒送杜位下第歸陸渾别業正月今欲半陸渾花未開出關見青草春色正東來夫子且歸去明時方愛才還須及秋賦莫即隠蒿萊還髙冠潭口留别舍弟昨日山有信祗今耕種時遥傳杜陵叟怪我還山遲獨向潭上酌無人林下棊東谿憶汝處閒卧對鸕鷀送張子尉南海不擇南州尉髙堂有老親樓臺重蜃氣邑里雜鮫人海暗三山雨花明五嶺春此鄉多寳玉慎莫厭清貧送張都尉東歸白羽緑弓弦年年只在邊還家劍鋒盡出塞馬蹄穿逐虜西踰海平胡北到天封侯應不逺燕頷豈徒然送王七録事赴虢州早嵗即相知嗟君最後時青雲仍未逹白髮欲成絲小店關門樹長河華岳祠𢎞農人吏待莫使馬行遲終南東谿中作谿水碧於草潺潺花底流沙平堪濯足石淺不勝舟洗藥朝與暮釣魚春復秋興來從所適還欲向滄洲漢上題韋氏莊結茅聞楚客卜築漢江邊日落數歸鳥夜深聞扣舷水痕侵岸柳山翠借㕑烟調笑提筐婦春來蠶幾眠題永樂韋少府㕔壁大河南郭外終日氣昬昬白鳥下公府青山當縣門故人是邑尉過客駐征軒不憚烟波闊思君一笑言首春渭西郊行呈藍田張二主簿迴風度雨渭城西細草新花踏作泥秦女峰頭雲未盡胡公陂上日初低愁窺白髮羞微禄悔别青山憶舊谿聞道輞川多勝事玉壺春酒正堪攜西過渭州見渭水思秦川渭水東流去何時到雍州憑添兩行淚寄向故園流獻封大夫破播仙凱歌漢將承恩西破戎捷書先奏未央宫天子預開麟閣待祗今誰數貳師功日落轅門鼔角鳴千羣面縳出藩城洗兵魚海雲迎陣秣馬龍堆月照營玉關寄長安李主簿東去長安萬里餘故人何惜一行書玉關西望堪腸斷况復明朝是嵗除虢州後亭送李判官使赴晉綘西原驛路挂城頭客散紅亭雨未收君去試看汾水上白雲猶似漢時秋赴北庭度隴思家西向輪臺萬里餘也知鄉信日應疎隴山鸚鵡能言語為報家人數寄書崔顥古遊俠呈軍中諸將少年負膽氣好勇復知機仗劍出門去孤城逢合圍殺人遼水上走馬漁陽歸錯落金鏁甲蒙茸貂鼠衣還家行且獵弓矢速如飛地迥鷹犬疾草深狐兔肥腰間帶兩綬轉盼生光輝顧謂今日戰何如隨建威贈王威古三十羽林將出身常事邊春風吹淺草獵騎何翩翩插羽兩相顧鳴弓新上弦射麋入深谷飲馬投寒泉馬上共傾酒野中聊割鮮相看未及飲雜虜冦幽燕烽火去不息胡塵髙際天長驅救東北戰解城亦全報國行赴難古來皆共然孟門行黄雀銜黄花翩翩傍簷隙本擬報君恩如何反彈射金罍美酒滿座春平原愛才多衆賔滿堂盡是忠義士何意得有讒諛人諛言反覆那可道能令君心不自保北園新栽桃李枝根株未固何轉移成陰結實君自取若問傍人那得知鴈門胡人歌髙山代郡東接燕鴈門胡人家近邊解放胡鷹逐塞鳥能將代馬獵秋田山頭野火寒多燒雨裏孤峯濕作烟聞道遼西無鬬戰時時醉向酒家眠七夕長安城中月如練家家此夜持針線仙裙玉珮空自知天上人間不相見長信深陰夜轉幽瑶階金閣數螢流班姬此夕愁無限河漢三更看斗牛贈梁州張都督聞君為漢將虜騎罷南侵出塞清沙漠還家拜羽林風霜臣節苦嵗月主恩深為語西河使知余報國心題沈隠侯八詠樓梁日東陽守為樓望越中緑窻明月在青史古人空江靜聞山狖川長數塞鴻登臨白雲晚流恨此遺風送單于裴都䕶赴西河征馬去翩翩城秋月正圓單于莫近塞都䕶欲臨邊漢驛通烟火胡沙乏井泉功成須獻捷未必去經年黄鶴樓昔人已乗白雲去此地空餘黄鶴樓黄鶴一去不復返白雲千載空悠悠晴川厯厯漢陽樹春草萋萋鸚鵡洲日暮鄉關何處是烟波江上使人愁行經華陰岧蕘太華俯咸京天外三峯削不成武帝祠前雲欲散仙人掌上雨初晴河山北枕秦關險驛樹西連漢畤平借問路傍名利客無如此處學長生遼西作燕郊芳嵗晚殘雪凍邊城四月青草合遼陽春水生胡人正牧馬漢將日徵兵露重寳刀濕沙虚金鼓鳴寒衣著已盡春服與誰成寄語洛陽使為傳邊塞情長干曲君家何處住妾住在横塘停船暫借問或恐是同鄉家臨九江水來去九江側同是長干人生小不相識崔國輔宿法華寺松雨時復滴寺門清且涼此心竟誰證回憩支公牀壁畫感靈跡龕經傳異香獨遊寄象外忽忽歸南昌石頭灘作悵矣秋風時余臨石頭瀨因髙見超逺盡此數州内羽山一㸃青海岸雜光碎離離樹木少淼淼湖波大日暮千里帆南飛落天外須臾遂入夜楚色有微靄㝷逺跡已窮遺榮事多昧一身猶未理安得濟時代且泛朝夕潮荷衣蕙為帶杭州北郭戴氏荷池送侯愉秋近萬物肅况當臨水時折花贈歸客離緒斷荷絲誰謂江國永故人感在兹道存過北郭情極望東菑喬木故園意鳴蟬窮巷悲扁舟竟何待中路毎遲遲怨詞妾有羅衣裳秦王在時作為舞春風多秋來不堪著魏宫詞朝日照紅妝擬上銅雀臺畫眉猶未了魏帝使人催長信草長信宫中草年年愁處生故侵珠履跡不使玉階行長樂少年行遺却珊瑚鞭白馬驕不行章臺折楊柳春日路傍情王孫遊自與王孫别頻看黄鳥飛應由春草誤著處不成歸白紵詞洛陽梨花落如霰河陽桃葉生復齊坐惜玉樓春欲盡紅緜粉絮裛妝啼陶翰古塞下曲進軍飛狐北窮㓂勢將變日落沙塵昬背河更一戰駿馬黄金勒琱弓白羽箭射殺左賢王歸奏未央殿欲言塞下事天子不召見東出咸陽門哀哀淚如霰燕歌行請君留楚調聽我吟燕歌家在遼水頭邊風意氣多出身為漢將正值戎未和雪中凌天山冰上度交河大小百餘戰封侯竟蹉跎歸來灞陵下故舊無相過雄劍委塵匣空門唯雀羅玉篸還趙姝瑶琴付齊娥昔日不為樂時哉今奈何望太華贈盧司倉行吏到西華乃覩三峰壯削成元氣中傑出天漢上如有飛動色不知青冥狀臣靈安在哉厥跡猶可望方此嘆行役末由飭仙裝葱蘢記星壇明滅數雲嶂良友垂真契宿心所微尚敢投歸山吟霞逕一相訪晚出伊闕寄河南裴中丞退無偃息資進無當代䇿冉冉時將暮坐為周南客前登關塞門永眺伊城陌長川黯已空千里寒氣白家本渭水西異日同所適秉志師禽尚微言祖莊易一辭林壑間共繫風塵役才名忽先進天邑多紛劇豈念嘉遯時依依偶沮溺宿天竺寺松栢亂巖口山西微逕通天開一峰見宫闕生虚空正殿倚霞壁千樓標石叢夜來猨鳥靜鐘梵寒雲中峰翠映湖月泉聲亂谿風心超諸境外了與懸解同明發氣候改起視長崖東湖色濃蕩漾海光漸曈曚葛仙跡尚在許氏道猶崇獨往古來事幽懐期二公出蕭關懐古驅馬擊長劍行役至蕭關悠悠五原上永眺關河前北虜三十萬此中常控弦秦城亘宇宙漢帝理旌旃刁斗鳴不息羽書日夜傳五軍計莫就三䇿議空全大漠横萬里蕭條絶人烟孤城當瀚海落日照祈連愴矣苦寒奏懐哉式㣲篇更悲秦樓月夜夜出胡天乗潮至漁浦作艤棹乗早潮潮來如風雨樟臺忽已隠界峰莫及覩紀事作嶂高忽已界峯暗莫及覩崩騰心為失浩蕩目無主風停浪始聞漾漾入漁浦雲景共澄霽江山相吞吐偉哉造化工此事從終古流沫誠足誡商歌調昜苦頗因忠信全客心猶栩栩秋山夕興山月松篠下月明山景鮮聊為高秋酌復此清夜絃晤語方獲志栖心亦彌年尚言興未逸更理逍遥篇王灣次北固山下客路青山外行舟緑水前潮平兩岸闊風正一帆懸海日生殘夜江春入舊年鄉書何處逹歸鴈洛陽邊一本作江南意南國多新意東行伺早天潮平兩岸失風正一帆懸海日生殘夜江春入舊年從來觀氣象惟向此中偏薛據出青門往南山下别業舊居在南山夙駕自城闕榛莽相蔽虧去爾漸超忽散漫餘雪晴蒼茫季冬月寒風吹長林白日原上没懐抱曠莫伸相知阻胡越弱年好棲隠鍊藥在巖窟及此離垢氛興來亦因物末路期赤松斯言庶不伐泊震澤口日落草木陰舟徒泊江氾蒼茫萬象開合沓聞風水洄沿值漁翁䆗窱逢樵子雲開天宇靜月明照萬里早鴈湖上飛晨鐘海邊起獨坐嗟逺遊登岸望孤洲零落星欲盡朣朧氣漸收行藏空自秉智識仍未周伍胥既仗劍范蠡亦乗流歌竟鼓楫去三江多客愁崔曙宿大通和尚塔贈如上人兼呈常孫二山人支公已寂滅影塔山上古更有真僧來道場救諸苦一承微妙法寓宿清淨土身心能自觀色相了無取森森松映月漠漠雲近户嶺外飛電明夜來前山雨然燈見棲鴿作禮聞信鼓曉霽南軒開秋華淨天宇願言出世塵謝爾申及甫潁陽東谿懐古靈谿氛霧歇皎鏡清心顔空色下映水秋聲多在山世人久疎曠萬物皆自閒白鷺寒更浴孤雲晴未還昔時讓王者此地閉𤣥關無以躡高步淒涼林壑間早發交崖山還太室作東林氣微白寒鳥忽高翔吾亦自兹去北山歸草堂仲冬正三五日月遥相望肅肅過潁上曨曨辨少陽川冰生積雪野火出枯桑獨往路難盡窮陰人易傷傷此無衣客如何蒙雪霜九日登望仙臺呈劉明府容漢文皇帝有高臺此日登臨曙色開三晉雲山皆北向二陵風雨自東來關門令尹誰能識河上仙翁去不囘且欲近㝷彭澤宰陶然共醉菊花杯賈至寓言春草紛碧色佳人曠無期悠哉千里心欲采商山芝歎息良㑹晚如何桃李時懐君晴川上佇立夏雲滋岳陽樓宴王員外貶長沙極浦三春草高樓萬里心楚山晴靄碧湘水暮流深忽與朝中舊同為澤畔吟停杯試北望還欲淚沾襟春思紅粉當壚弱柳垂金花臘酒解酴醿笙歌日暮能留客醉殺長安輕薄兒答嚴大夫今夕秦天一鴈來梧桐墜葉擣衣催思君獨步華亭月舊館秋陰生緑苔送李侍郎赴常州雪晴雲散北風寒楚水吳山道路難今日送君須盡醉明朝相憶路漫漫巴陵夜别王八員外柳絮飛時别洛陽梅花發後在三湘世情已逐浮雲散離恨空隨江水長初至巴陵與李十二白裴九同泛洞庭湖楓岸紛紛落葉多洞庭秋水晚來波乗興輕舟無近逺白雲明月弔湘娥西亭春望日長風暖柳青青北鴈歸飛入窅冥岳陽城上聞吹笛能使春心滿洞庭張謂讀後漢逸人傳子陵没巳久讀史思其賢誰謂潁陽人千秋如比肩嘗聞漢皇帝曽是曠周旋名位茍無心對君猶可眠東過富春渚樂此佳山川夜卧松下月朝看江上烟釣時如有待釣罷應忘筌生事在林壑悠悠經暮年于今七里瀨遺迹尚依然高臺竟寂寞流水空潺湲同王徵君湘中有懐八月洞庭秋瀟湘水北流還家萬里夢為客五更愁不用開書帙偏宜上酒樓故人京洛滿何日復同遊别韋郎中星軺計日赴岷峨雲樹連天阻笑歌南入洞庭隨鴈去西過巫峽聽猿多崢嶸洲上飛黄蝶灔澦堆邊起白波不醉郎中桑落酒教人無奈别離何張旭桃花谿隠隠飛橋隔野煙石磯西畔問漁船桃花盡日隨流水洞在清谿何處邊山行留客山光物態弄春輝莫為輕陰便擬歸縱使晴明無雨色入雲深處亦沾衣一日書春草青青萬里餘邊城落日見離居情知海上三年别不寄雲間一紙書柳濯濯烟條拂地垂城邊樓畔結春思請君細看風流意未減靈和殿裏時李嶷淮南秋夜呈周偘天淨河漢高夜閒砧杵發清秋忽如此離恨應難歇風亂池上螢露光竹間月與君共遊處勿作他鄉别林園秋夜作林卧避殘暑白雲長在天賞心既如此對酒非徒然月色徧秋露竹聲兼夜泉涼風懐袖裏兹意與誰傳萬楚題江潮莊壁田家喜秋熟嵗宴林葉稀禾黍積塲圃樝梨垂户扉野閒犬時吠日暮牛自歸時復落花酒茅齋堪解衣河上逢落花河水浮落花花流東不息應見浣紗人為道長相憶丁仙芝渡揚子江桂楫中流望空波兩畔明林開揚子驛山出潤州城海盡邊陰靜江寒朔吹生更聞楓葉下淅瀝度秋聲江南曲未曉已成妝乗潮去茫茫因從京口渡使報邵陵王始下芙蓉樓言發瑯琊岸急為打船開惡許傍人見沈千運感懐示弟妹今日天氣暖東風杏花坼筋力久不如却羡澗中石神仙杳難信中壽稀滿百近世多夭傷喜見鬢髮白杖藜竹樹間宛宛舊行跡豈知林園主却是林園客兄弟所存半空為亡者惜㝠㝠無再期哀哀望松栢骨肉能幾人年大自疎隔性情誰免此與我不相易唯願得爾輩相看慰朝夕平生兹已矣此外盡非適孟雲卿古别離朝日上高臺離人怨秋草但見萬里天不見萬里道君行本迢逺苦樂良難保宿昔夢同衾憂心常傾倒含酸欲誰訴展轉傷懐抱結髮年已遲征行去何早寒暄有時謝憔悴難再好人皆算年壽死者何曽老少壯無見期水深風浩浩傷懐贈故人稍稍晨鳥翔淅淅草上霜人生早艱苦壽命恐不長二十學己成三十名不彰豈無同門友貴賤易中腸驅馬行萬里悠悠過帝鄉幸因絃歌末得上君子堂衆樂互喧奏獨子備笙簧坐中無知音安得神揚揚願因高風起上感白日光元結賊退示官吏有序癸卯嵗西原賊入道州焚燒殺掠幾盡而去明年賊又攻永破邵不犯此州邊鄙而退豈力能制敵歟蓋蒙其傷憐而已諸使何為忍苦徵斂故作詩一篇以示官吏昔年逢太平山林二十年泉源在庭户洞壑當門前井税有常期日晏猶得眠忽然遭世變數嵗親戎旃今來典斯郡山夷又紛然城小賊不屠人貧傷可憐是以陷鄰境此州獨見全使臣將王命豈不如賊焉今彼徵斂者迫之如火煎誰能絶人命以作時世賢思欲委符節引竿自刺船將家就魚麥歸老江湖邊石魚湖醉歌石魚湖似洞庭夏水欲滿君山青山為樽水為沼酒徒厯厯坐洲島長風連日作大浪不能廢人運酒航我持長瓢坐巴丘酌飲四坐以散愁欵乃曲湘江二月春水平滿月和風宜夜行唱橈欲過平陽戍官吏相呼問姓名千里楓林烟雨深無朝無暮有猿吟停橈靜聽曲中意好是雲山韶濩音下瀧船似入深淵上瀧船似欲昇天瀧南始到九疑郡應絶高人乗興船元融泉上雨後作風雨蕩煩暑雷息佳霽初衆峯帶雲雨秋氣入我廬颯颯涼飈來窺臨愜所圖緑蘿長新蔓褭褭垂座隅流水復簷下丹砂發清渠養葛為我衣種芋為我蔬誰是畹與畦瀰漫連野蕪蕭潁士越江秋曙扁舟東路逺曉月下江濆瀲灎信潮上蒼茫孤嶼分林聲寒動葉水氣曙連雲暾日浪中出榜歌天際聞伯鸞常去國安道惜離羣延首剡谿近詠言懐數君李華仙遊寺有龍潭穴弄玉祠捨事入樵徑雲木深谷口萬壑移晦明千峯轉前後嶷然龍潭上石勢若奔走開拆秋天光崩騰夏雷吼靈谿自兹去紆直互紛糾聽聲靜復喧望色無更有𡨕㝠翠微下高殿映杉柳滴滴洞穴中懸泉響相扣昔時秦王女羽化年代久日暮松風來簫聲生左右早窺神仙籙願結芝术友安得羡門方青囊繫吾肘梁鍠觀美人卧妾家巫峽陽羅帳寢銀牀曉日臨窻久春風引夢長落釵仍罥鬢微汗欲銷黄縱使朦朧覺魂猶逐楚王李收幽情幽人惜春暮潭上折芳草佳期何時還欲寄千里道薛竒章吳聲子夜歌一作崔國輔古意淨掃黄金階飛霜皎如雪下簾彈箜篌不忍見秋月楊諫答長孫十一東山春夜見贈故人謝城闕揮手碧雲期谿月照隠處松風生興時舊林日云暮芳草嵗空滋甘與子成夢請君同所思奚賈㝷許山人亭子桃源若逺近漁子棹輕舟川路行難盡人家到漸幽山禽拂席起溪水入庭流君是何年隠如今成白頭萬齊融贈别東南飛鳥處言是故鄉天江上風花晚君行定幾千計程頻破月數别屢開年明嵗潯陽水相思寄采蓮唐賢三昧集巻下
