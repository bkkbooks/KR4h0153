body:
  text: 唐賢三昧集巻中刑部尚書王士禎編孟浩然登江中孤嶼贈白雲先生王迴悠悠清江水水落沙嶼岀迴潭石下深緑篠岸傍密鮫人濳不見漁父歌自逸憶與君别時泛舟如昨日夕陽開返照中坐興非一南望鹿門山歸來恨如失秋登蘭山寄張五北山白雲裏隠者自怡悅相望試登高心隨鴈飛滅愁因薄暮起興是清秋發時見歸村人沙行渡頭歇天邊樹若薺江畔洲如月何當載酒來共醉重陽節湖中旅泊寄閻九司户防桂水通百越扁舟期曉發荆雲蔽三巴夕望不見家襄王夢行雨才子謫長沙長沙饒瘴癘胡為苦留滯久别思欵顔承歡懐接袂接袂杳無由徒增旅泊愁清猿不可聽沿月下湘流宿揚子津寄長山劉隠士所思在建業欲往大江深日夕望京口烟波愁我心心馳茅山洞目極楓樹林不見少微隠星霜勞夜吟夏日南亭懐辛大山光忽西落池月漸東上散髮乗夕凉開軒卧閒敞荷風送香氣竹露滴清響欲取鳴琴彈恨無知音賞感此懐古人中宵勞夢想㝷香山湛上人朝遊訪名山山逺在空翠氛氲亘百里日入行始至杖䇿㝷故人解鞍暫停騎石門殊豁險篁逕轉深邃法侣欣相逢清談曉不寐平生慕真隠累日求靈異野老朝入田山僧暮歸寺松泉多逸響苔壁饒古意谷口聞鐘聲林端識香氣近本以上二句在第五第六願言投此山身世兩相棄宿天台桐栢觀海行信風帆夕宿逗雲島緬㝷滄洲趣近愛赤城好捫蘿亦踐苔輟棹恣探討息陰憩桐栢采秀弄芝草鶴唳清露垂雞鳴信潮早願言解纓紱從此無煩惱髙步凌四明𤣥蹤得三老紛吾逺遊意學彼長生道日夕望三山雲濤空浩浩峴潭作石潭傍隈隩沙岸曉夤縁試垂竹竿釣果得槎頭鯿美人騁金錯纎手膾紅鮮因謝陸内史蓴羮何足傳題終南翠微寺空上人房翠微終南裏雨後宜返照閉關久沈㝠杖䇿一登眺遂造幽人室始知靜者妙儒道雖異門雲林頗同調兩心喜相得畢景共譚笑暝還高牕眠時見逺山燒緬懐赤城標更憶臨海嶠風泉有清音何必蘇門嘯宿業師山房待丁大不至夕陽度西嶺羣壑倐巳暝松月生夜凉風泉滿清聽樵人歸欲盡煙鳥棲初定之子期宿來孤琴候蘿逕耶谿泛舟落景餘清輝輕橈弄谿渚澄明愛水物臨泛何容與白首垂釣翁新妝浣紗女相看似相識脈脈不得語彭蠡湖中望廬山太虚生月暈舟子知天風挂席候明發𦕈漫平湖中中流見匡阜勢壓九江雄黤黕容霽色崢嶸當曉空香爐初上日瀑布噴成虹久欲追尚子况兹懐逺公我來限于役未暇息微躬淮海途將半星霜嵗欲窮寄言巖栖者畢趣當來同登鹿門山清曉因興來乗流越江峴沙禽近方識浦樹遥莫辨漸至鹿門山山明翠微淺巗潭多屈曲舟檝屢迴轉昔聞龎徳公采藥遂不返金澗餌芝术石牀卧苔蘚紛吾感耆舊結纜事攀踐隠迹今尚存髙風邈巳逺白雲何時去丹桂空偃蹇探討意未窮迴艫夕陽晩遊明禪師西山蘭若西山多竒狀秀出倚前楹亭午收彩翠夕陽照分明吾師住其下禪坐證無生結廬就嵌窟翦苕通徑行談空對樵叟授法與山精日暮方辭去田園歸冶城疾愈過龍泉寺精舍呈易業二公亭午聞山鐘起行散愁疾㝷林采芝去谷轉松蘿密傍見精舍開長廊飯僧畢石渠流雪水金子耀霜橘竹房思舊遊過憩終永日入洞窺石髓傍崖采蜂蜜日暮辭逺公虎谿相送出萬山潭作垂釣坐磐石水清心亦閒魚行潭樹下猿挂島藤間游女昔解珮傳聞於此山求之不可得沿月棹歌還早發漁浦潭東旭早光芒渚禽已驚聒卧聞漁浦口橈聲暗相撥日出氣象分始知江路闊美人常晏起照影弄流沫飲水畏驚猿祭魚時見獺舟行自無悶况值晴景豁嵗暮海上作仲尼既云殁余亦浮于海昬見斗柄迴方知嵗星改虚舟任所適垂釣非有待為問乗槎人滄洲復何在聽鄭五彈琴阮籍推名飲清風滿竹林半酣下衫袖拂拭龍唇琴一杯彈一曲不覺夕陽沈予意在山水聞之諧夙心和張二自穰縣還途中遇雪風吹沙海雪漸作柳園春宛轉隨香騎輕盈伴玉人歌疑郢中客態比洛川神今日南歸楚雙飛似入秦望洞庭湖贈張丞相八月湖水平涵虚混太清氣蒸雲夢澤波撼岳陽城欲濟無舟楫端居恥聖明坐觀垂釣者徒有羡魚情宿永嘉江寄山陰崔少府國輔我行窮水國君使入京華相去日千里孤帆天一涯卧聞海潮至起視江月斜借問同舟客何時到永嘉夜泊廬江聞故人在東寺詩寄之江路經廬阜松門入虎谿聞君㝷寂樂清夜宿招提石鏡山精怯禪枝怖鴿棲一燈如悟道為照客心迷宿桐廬江寄廣陵舊遊山暝聽猿愁滄江急夜流風鳴兩岸葉月照一孤舟建徳非吾土維揚憶舊遊還將兩行淚遥寄海西頭澗南即事胎皎上人弊廬在郭外素産惟田園左右林野曠不聞朝市喧釣竿垂北澗樵唱入南軒書取幽棲事將㝷靜者論九日懐襄陽去國似如昨倐然經杪秋峴山望不見風景令人愁誰采籬下菊應閒池上樓宜城多美酒歸與葛彊遊初出關旅亭夜坐懐王大校書向夕槐烟起葱蘢池館曛客中無偶坐關外惜離羣燭至螢光滅荷枯雨滴聞永懐芸閣友寂寞滯揚雲早寒江上有懐木落鴈南渡北風江上寒我家襄水曲遥隔楚雲端鄉淚客中盡孤帆天際看迷津欲有問平海夕漫漫留别王侍御維寂寂竟何待朝朝空自歸欲㝷芳草去惜與故人違當路誰相假知音世所稀祗應守寂寞還掩故園扉廣陵别薛八士有不得志栖栖吳楚間廣陵相遇罷彭蠡泛舟還檣出江中樹波連海上山風帆明日逺何處更追攀與諸子登峴山作人事有代謝往來成古今江山留勝跡我輩復登臨水落魚梁淺天寒夢澤深羊公碑尚在讀罷淚沾襟㝷天台山吾友太乙子餐霞卧赤城欲㝷華頂去不憚惡溪名歇馬憑雲宿揚帆截海行高高翠微裏遥見石梁横晚泊潯陽望廬山挂席幾千里名山都未逢泊舟潯陽郭始見香爐峯嘗讀逺公傳逺懐塵外蹤東林精舎近日暮坐聞鐘武陵泛舟武陵川路狹前棹入花林莫測幽源裏仙家信幾深水迴青嶂合雲渡緑谿陰坐聽閒猿嘯彌清塵外心遊精思觀迴王白雲在後出谷未亭午至家日已曛迴瞻下山路但見牛羊羣樵子暗相失草蟲寒不聞衡門猶未掩佇立望夫君題大禹寺義公房義公習禪處結搆依空林戸外一峰秀堦前羣壑深夕陽連雨足空翠落庭陰看取蓮花淨應知不染心裴司士員司戸見㝷府僚能枉駕家醖復新開落日池上酌清風松下來㕑人具雞黍稚子摘楊梅誰道山公醉猶能騎馬回李氏園卧疾我愛陶家趣園林無俗情春雷百卉坼寒食四鄰清伏枕嗟公幹歸山羡子平年年白社客空滯洛陽城嵗暮歸南山北闕休上書南山歸敝廬不才明主棄多病故人疎白髮催年老青陽逼嵗除永懐愁不寐松月夜窻虚舟中曉望挂席東南望青山水國遥舳艫爭利涉來往接風潮問我今何適天台訪石橋坐看霞色晚疑是赤城標夜泊牛渚趂薛八船不及星羅牛渚夕風退鷁舟遲浦漵嘗同宿烟波忽間之榜歌空裏失船火望中疑明發泛湖海茫茫何處期夜渡湘水客舟貪利涉闇裏渡湘川露氣聞芳杜歌聲識采蓮榜人投岸火漁子宿潭烟行侣時相問潯陽何處邊永嘉上浦館逢張八子容逆旅相逢處江村日暮時衆山遥對酒孤嶼共題詩廨宇鄰鮫室人烟接島夷鄉園萬餘里失路一相悲宿武陽即事川暗夕陽盡孤舟泊岸初嶺猿相呌嘯潭影似空虚就枕滅明燭扣舷聞夜漁雞鳴問何處人物是秦餘陪張丞相自松滋江東泊渚宫放溜下松滋登舟命檝師詎忘經濟日不憚沍寒時岸幘豈獨古濯纓良在兹政成人自理機息鳥無疑雲物凝孤嶼江山辨四維晚來風稍緊冬至日行遲獵響驚雲夢漁歌激楚辭渚宫何處是川暝欲安之西山㝷辛諤漾舟乗水便因訪故人居落日晴川裏誰言獨羡魚石潭窺洞徹沙岸厯紆徐竹嶼見垂釣茅齋聞讀書欵言忘景夕清興屬涼初回也一瓢飲賢哉常晏如夜泊宣城界西塞沿江島南陵問驛樓湖平津濟闊風止客帆收去去懐前事茫茫泛夕流石逢羅刹礙山泊敬亭幽火識梅根冶烟迷楊葉洲離家復水宿相伴賴沙鷗送杜十四之江南荆吳相接水為鄉君去春江正淼茫日暮征帆何處泊天涯一望斷人腸王昌齡塞下曲蟬鳴空桑林八月蕭關道出塞復入塞處處黄蘆草從來幽并客皆共塵沙老莫學游俠兒矜誇紫騮好飲馬渡秋水水寒風似刀平沙日未没黯黯見臨洮昔日長城戰咸言意氣高黄塵足今古白骨亂蓬蒿鄭縣宿陶太公館中贈馮六元二儒有輕王侯脫略當世務本家藍田下非為漁弋故無何困躬耕且欲馳永路幽居與君近出谷同所騖昨日辭石門五年變秋露雲龍未相感干謁亦巳屢子為黄綬羈余忝蓬山顧京門望西嶽百里見郊樹飛雨祠上來靄然關中暮驅車鄭城宿秉燭論往素山月出華陰開此河渚霧清光比故人豁逹展心晤馮公尚戢翼元子仍跼步張范善終始吾等豈不慕罷酒當涼風屈伸備㝠數聽彈風入松闋贈楊補闕商風入我絃夜竹深有露絃悲與林寂清景不可度寥落幽居心颼飀青松樹松風吹草白谿水寒日暮聲意去復還九變待一顧空山多雨雪獨立君始悟緱氏尉沈興宗置酒南谿留贈林色與谿古深篁引幽翠山樽在漁舟棹月情巳醉始窮清源口壑絶人境異春泉滴空崖萌草拆陰地久之風榛寂逺聞樵聲至海鴈時獨飛永然滄洲意古時青㝠客滅跡淪一尉吾子躊躇心豈其紛埃事緱峯信所尅濟北餘乃遂齊物意巳㑹息肩理猶未巻舒形性表脫略賢哲議仲月期角巾飯僧嵩陽寺同從弟南齋翫月憶山陰崔少府高卧南齋時開帷月初吐清輝澹水木演漾在窻户苒苒幾盈虚澄澄變今古美人清江畔是夜越吟苦千里其如何微風吹蘭杜巴陵别劉處士劉生隠岳陽心逺洞庭水偃帆入山郭一宿楚雲裏竹映秋館深月寒江門起烟波桂陽接日夕數千里嫋嫋清夜猿孤舟坐如此湘中有來鴈雨雪候音㫖宿裴氏山莊蒼蒼竹林暮吾亦知所投靜坐山齋月清谿聞逺流西峯下微雨向曉白雲收遂解塵中組終南春可遊齋心女蘿覆石壁谿水幽蒙籠紫葛蔓黄花娟娟寒露中朝飲花上露夜卧松下風雲英化為水光采與我同日月蕩精魄寥寥天宇空江上聞笛横笛怨江月扁舟何處㝷聲長楚山外曲遶胡關深相去萬餘里遥傳此夜心寥寥浦漵寒響盡惟幽林不知誰家子復奏邯鄲音水客皆擁棹空霜遂盈襟羸馬望北走遷人悲越吟何當邊草白旌節隴城陰趙十四兄見訪客來舒長簟開閣延清風但有無絃琴共君盡樽中晚來嘗讀易頃者欲還嵩世事何須道黄精且養蒙嵇康殊寡識張翰獨知終忽憶鱸魚膾扁舟往江東過華陰雲起太華山雲山互明滅東峯始含景了了見松雪羈人感幽棲窅映轉竒絶欣然忘所疲永望吟不輟信宿百餘里出關玩新月何意昨來心遇物遂遷别人生屢如此何以肆愉悅送李擢遊江東清洛日夜漲微風引孤舟離觴便千里逺夢生江樓楚國橙橘暗吳門烟雨愁東南具今古歸望山雲秋客廣陵樓頭廣陵近九月在南徐秋色明海縣寒烟生里閭夜帆歸楚客昨日渡江書為問易名叟垂綸不見魚宿京江口期劉眘虚不至霜天起長望殘月生海門風靜夜潮滿城高寒氣昬故人何寂寞久已乖清言明發不能寐徒盈江上樽答武陵田太守仗劍行千里微軀敢一言曽為大梁客不負信陵恩送張四楓林已愁暮楚水復堪悲别後冷山月清猿無斷時從軍行烽火城西百尺樓黄昬獨上海風秋更吹羌笛關山月無那金閨萬里愁琵琶起舞換新聲總是關山離别情撩亂邊愁彈不盡高高秋月照長城大漠風塵日色昬紅旗半捲出轅門前軍夜戰洮河北已報生擒吐谷渾出塞秦時明月漢時關萬里長征人未還但使龍城飛將在不教胡馬度陰山西宫春怨西宫夜靜百花