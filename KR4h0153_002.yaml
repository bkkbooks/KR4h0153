長往一樽聊可依了然潭上月適我胸中機在昔同門友如今出處非優游白虎殿偃息青瑣闈且有薦君表當看攜手歸寄書不待靣蘭茝空芳菲寄萬齊融名高不擇仕委世隨虚舟小邑常嘆屈故鄉行可遊青楓半村户香稻盈田疇為政日清淨何人同海鷗揺巾北林夕把菊東山秋對酒池風滿向家湖水流岸陰止鳴鶴山色映濳虬靡靡俗中理蕭蕭川上幽昔年至吳郡常憶卧江樓我有一書札因之芳杜洲登首陽山謁夷齊廟古人已不見喬木竟誰過寂寞首陽山白雲空復多蒼苔歸地骨皓首采薇歌畢命無怨色成仁其若何我來入遺廟時候微清和落日弔山鬼回風吹女蘿石門正西豁引領望黄河千里一飛鳥孤光東逝波驅車層城路惆悵此巗阿送王昌齡漕水東去逺送君多暮情淹留野寺出向背孤山明前望數千里中無蒲稗生夕陽滿舟檝但愛微波清舉酒林月上解衣沙鳥鳴夜來蓮花界夢裏金陵城歎息此離别悠悠江海行留别王盧二拾遺此别不可道此心當報誰春風灞水上飲馬桃花時誤作好文士只令遊宦遲留書下朝客我有故山期古從軍行白日登山望烽火黄昬飲馬傍交河行人刁斗風沙暗公主琵琶幽怨多野雲萬里無城郭雨雪紛紛連大漠胡鴈哀鳴夜夜飛胡兒眼淚雙雙落聞道玉門猶被遮應將性命逐輕車年年戰骨埋荒外空見蒲桃入漢家緩歌行小來託身攀貴遊傾財破産無所憂暮擬經過石渠署朝將出入銅龍樓結交杜陵輕薄子謂言可生復可死一沈一浮㑹有時棄我翻然如脫屣男兒立身須自强十年閉戸潁水陽業就功成見明主擊鐘鼎食坐華堂二八娥眉梳墮馬美酒清歌曲房下文昌宫中賜錦衣長安陌上退朝歸五陵賓從莫敢視三省官僚揖者稀早知今日讀書是悔作從前任俠非放歌行答從弟墨卿小來好文恥學武世上功名不解取雖沾寸禄已後時徒欲出身事明主栢梁賦詩不及宴長楸走馬誰相數斂迹俛眉心自甘高歌擊節聲半苦由是蹉跎一老夫養雞牧豕城東隅空歌漢代蕭相國肯事霍家馮子都徒爾當年聲籍籍濫作詞林兩京客故人斗酒安陵橋黄鳥春風洛陽陌吾家令弟才不羈五言破的人共推興來逸氣如濤湧千里長江歸海時别離短景何蕭索佳句相思能間作舉頭遥望魯陽山木葉紛紛向人落送劉十三十不官亦不娶時人焉識道高下房中唯有老氏經櫪上空餘少游馬往來嵩華與函秦放歌一曲前山春西林獨鶴引閒步南澗飛泉清角巾前年上書不得意歸卧東窻兀然醉諸兄相繼掌青史第五之名齊驃騎烹葵摘果告我行落日夏雲縱復横聞道謝安掩口笑知君不免為蒼生送康洽入京進樂府識子十年何不遇只愛歡遊兩京路朝吟左氏嬌女篇夜誦相如美人賦長安春物舊相宜小苑蒲萄花滿枝柳色偏濃九華殿鶯聲醉殺五陵兒曳裾此日從何所中貴由來盡相許白裌春衫仙吏贈烏皮隠几臺郎與新詩樂府唱堪愁御伎應傳鳷鵲樓西上雖因長公主終須一見曲陽侯别梁鍠梁生倜儻心不羈途窮氣蓋長安兒回頭轉眄似鵰鶚有志飛鳴人豈知雖云四十無禄位曽與大軍掌書記抗辭請刃誅部曲作色論兵犯二帥一言不合龍頟侯擊劍拂衣從此棄朝朝飲酒黄公壚脫帽露頂爭呌呼庭中犢鼻昔嘗挂懐裏琅玕今在無時人見子多落魄共笑狂歌非逺圖忽然遣躍紫騮馬還是昂藏一丈夫洛陽城頭曉霜白層冰峨峨滿川澤但聞行路吟新詩不歎舉家無擔石莫言貧賤長可欺覆簣成山當有時莫言富貴長可託木槿朝看暮還落不見古時塞上翁倚伏由來任天作去去滄波勿復陳五湖三江愁殺人少室雪晴送王寜少室衆峰幾峰别一峰晴見一峰雪隔城半山連青松素色峨峨千萬重過景斜臨不可道白雲欲盡難為容行人與我翫幽境北風切切吹衣冷惜别浮橋駐馬時舉頭試望南山嶺送陳章甫四月南風大麥黄棗花未落桐陰長青山朝别暮還見嘶馬出門思舊鄉陳侯立身何坦蕩虬鬚虎眉仍大顙腹中貯書一萬巻不肯低頭在草莽東門沽酒飲我曹心輕萬事如鴻毛醉卧不知白日暮有時空望孤雲高長河浪頭連天黒津吏停舟渡不得鄭國遊人未及家洛陽行子空歎息聞道故林相識多罷官昨日今如何聽安萬善吹觱篥歌南山截竹為觱篥此樂本自龜兹出流傳漢地曲轉竒凉州胡人為我吹傍隣聞者多嘆息逺客思鄉皆淚垂世人解聽不解賞長飈風中自來往枯桑老栢寒颼飀九雛鳴鳯亂啾啾龍吟虎嘯一時發萬籟百泉相與秋忽然更作漁陽摻黄雲蕭條白日暗變調如聞楊柳春上林繁花照眼新嵗夜高堂列明燭美酒一杯聲一曲愛敬寺古藤歌古藤池水盤樹根左攫右拏龍虎蹲横空直上相陵突丰茸離纚若無骨風雷霹靂連黒枝人言其下藏妖魑空庭落葉作開合十月苦寒常倒垂憶昨花飛滿空殿密葉吹香飯僧遍南階雙桐一百尺相與年年老霜霰古意男兒事長征少小幽燕客賭勝馬蹄下由來輕七尺殺人莫敢前鬚如蝟毛磔黄雲隴底白雪飛未得報恩不得歸遼東小婦年十五慣彈琵琶解歌舞今為羌笛出塞聲使我三軍淚如雨送劉昱八月寒葦花秋江浪頭白北風吹五兩誰是潯陽客鸕鷀山頭片雨晴揚州郭裏暮潮生行人夜宿金陵渚試聽沙邊有鴈聲送郝判官楚城木葉落夏口青山轉鴻鴈向南時君乘使者傳楓林帶水驛夜火明山縣千里送行人蔡州如眼見江連清漢東逶迤遥望荆雲相蔽虧應問襄陽舊風俗為余騎馬習家池聽董大彈胡笳聲兼寄語弄房給事蔡女昔造胡笳聲一彈一十有八拍胡人落淚向邊草漢使斷腸對歸客右戍蒼蒼烽火寒大荒沈沈飛雪白先拂商絃後角羽四郊秋葉驚摵摵董夫子通神明深山竊聽來妖精言遲更速皆應手將往復旋如有情空山百鳥散還合萬里浮雲陰且晴嘶酸雛鴈失羣夜斷絶胡兒戀母聲川為靜其波鳥亦罷其鳴烏孫部落家鄉逺邏娑沙塵哀怨生幽音變調忽飄灑長風吹林雨墮瓦迸泉颯颯飛木末野鹿呦呦走堂下長安城連東掖垣鳳凰池對青𤨏門高才脫畧名與利日夕望君抱琴至寄鏡湖朱處士澄霽晚流闊微風吹緑蘋鱗鱗逺峰見淡淡平湖春芳草日堪把白雲心所親何時可為樂夢裏東山人送人歸沔南梅花今正發失路復何如舊國雲山在新年風景餘春饒漢陽夢日寄武陵書可即明時老臨川莫羡魚送盧逸人洛陽為此别攜手更何時不復人間見祗應海上期清谿入雲木白首卧茆茨共惜盧敖去天邊望所思望秦川秦川朝望迥日出正東峰逺近山河淨逶迤城闕重秋聲萬戸竹寒色五陵松客有歸歟歎悽其霜露濃寄司勲盧員外流澌臘月下河陽草色新年發建章秦地立春傳太史漢宫題柱憶仙郎歸鴻欲度千門雪侍女新添五夜香早晚薦雄文似者故人今已賦長楊送魏萬之京朝聞遊子唱驪歌昨夜微霜初渡河鴻鴈不堪愁裏聽雲山況是客中過關城樹色催寒近御苑砧聲向晩多莫見長安行樂處空令嵗月易蹉跎送李回知君官屬大司農詔幸驪山職事雄嵗發金錢供御府晝看仙液注離宫千巖曙雪旌門上十月寒花輦路中不覩聲名與文物自傷流滯去關東宿瑩公禪房聞梵花宫仙梵逺微微月隠高城鐘漏稀夜動霜林驚落葉曉聞天籟發清機蕭條已入寒空靜䬃沓仍隨秋雨飛始覺浮生無住著頓令心地欲皈依題璿公山池逺公遯跡廬山岑開士幽居祗樹林片石孤峰窺色相清池皓月照禪心指揮如意天花落坐卧閒房春草深此外俗塵俱不染惟餘𤣥度得相㝷宿香山寺石樓夜宿翠微半高樓聞暗泉漁舟帶逺火山磬發孤烟衣拂雲松外門清河漢邊峰巒低枕席世界接人天靄靄花出霧輝輝星映川東林曙鶯滿惆悵欲言旋送盧少府赴延陵聞君從宦所何日府中趨遥指金陵縣青山天一隅行人懐寸禄小吏獻新圖北固波濤險南天風俗殊春江連橘柚晚景媚菰蒲漠漠花生渚亭亭雲過湖灘沙映春火水霧斂檣烏回首東門路鄉書不可無奉送五叔入京兼寄綦母三雲陰帶殘日悵别此何時欲望黄山道無由見所思寄韓鵬為政心閒物自閒朝看飛鳥暮飛還寄書河上神明宰羡爾城頭姑射山百花原百花原頭望京師黄河水流無盡時秋天曠野行人絶馬首東來知是誰遇劉五洛陽一别梨花新黄鳥飛飛逢故人攜手當年共為樂無驚蕙艸惜殘春綦母濳冬夜寓居寄儲太祝自為洛陽客夫子吾知音愛義能下士時人無此心奈何離居夜巢鳥悲空林愁坐至月上復聞南鄰砧春泛若耶谿幽意無斷絶此去隨所偶晚風吹行舟花路入谿口際夜轉西壑隔山望南斗潭烟飛溶溶林月低向後生事且瀰漫願為持竿叟題鶴林寺道林隠形勝向背臨層霄松覆山殿冷花藏谿路遥珊珊寳幡挂焰焰明燈燒遲日半空谷春風連上潮少適水木興暫令身心調願謝攜手客兹山禪侣饒題招隠寺絢公房開士度人久空巖花霧深徒知燕坐處不見有為心蘭若門對壑田家路隔林還言證法性歸去比黄金題靈隠寺山頂禪院招提此山頂下界不相聞塔影挂清漢鐘聲和白雲觀空靜室掩行道衆香焚且駐西來駕人天日未曛若耶谿逢孔九相逢此谿曲勝託在烟霞潭影竹間動巖陰簷外斜人言上皇代犬吠武陵家借問淹留日春風滿若耶王之渙送别楊柳東風樹青青夾御河近來攀折苦應為别離多涼州詞黄河逺上白雲間一片孤城萬仞山羌笛何須怨楊柳春光不度玉門關登鸛鵲樓白日依山盡黄河入海流欲窮千里目更上一層樓張子容春江花月夜林花發岸口氣色動江新此夜江中月流光花上春分明石潭裏宜照浣紗人送孟浩然歸襄陽東越相逢地西亭送别津風濤看解纜雲海去愁人鄉在桃林岸江連楓樹春因懐故園意歸與孟家鄰閻防晚秋石門禮拜輕䇿臨絶壁招提謁金仙舟車無由徑岸嶠乃屬天躑躅淹昃景夷猶望新弦石門變暝色谷口生人烟陽鴈呌平楚秋風急寒川馳暉苦代謝浮脆暫貞堅永欲卧丘壑息心依梵筵誓將厯刼願無以外物牽百丈谿新理茅茨讀書浪迹棄人世還山自幽獨始傍巢由蹤吾其獲心曲荒庭何所有老樹半空腹秋蜩鳴北林暮鳥穿我屋栖遲樂遵渚恬曠寡所欲開卦推盈虚散帙攻節目養閒度人事逹命知止足不學東國儒俟時勞伐輻與永樂諸公夜泛黄河作烟深載酒入但覺暮川虚映水見山火鳴榔聞夜漁愛兹山水趣忽與人世疎無暇然官燭中流有望舒唐賢三昧集巻中
