body:
  text: 唐賢三昧集總集類提要臣等謹按唐賢三昧集三卷國朝王士禎編士禎有古歡録巳著録初士禎少年嘗與其兄士祿撰神韻集見所作居易録中然其書為人改竄巳非其舊故晚定此編皆録盛唐之作名曰三昧取佛經自在義也詩自太倉歷下以雄渾博麗為主其失也膚公安竟陵以清新幽渺為宗其失也詭學者兩途並窮不得不折而入宋其弊也滯而不靈直而好盡語録史論皆可成篇於是士禎等重申嚴羽之說獨主神韻以矯之蓋亦救弊補偏各明一義其後風流相尚光景流連趙執信等遂復操二馮舊法起而相爭所作談龍録排詆是書不遺餘力其論雖非無見然兩說相濟其理乃全殊途同歸未容偏廢今仍並録存之以除門户之見又閻若璩潜邱劄記有與趙執信書詆此集所録如張旭四絶句本宋蔡襄詩而誤收又詆其祖詠詩誤以京水為涇水孟浩然詩誤以涔陽為潯陽王維詩誤以御亭為卸亭蔡洲為蔡州髙適燕歌行誤以渝關為榆關全不講於地理之學引据精詳皆切中其病然士禎自品詩格原不主於考證若璩所云不必為是集諱亦不必為是集病也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:784dad48f0d6ac4e5ed47052e1a30a972a0285e5de638f065456896057162dbe
