body:
  text: 唐賢三昧集巻上刑部尚書王士禎編王維贈劉藍田籬間犬迎吠出屋候荆扉嵗晏輸井稅山村人夜歸晩田始家食餘布成我衣詎肯無公事煩君問是非贈祖三詠蠨蛸挂虛牖蟋蟀鳴前除嵗晏凉風至君子復何如高館閴無人離居不可道閒門寂巳閉落日照秋草雖有近音信千里阻河闗中復客汝潁去年歸舊山結交二十載不得一日展貧病子既深契闊余不淺仲秋雖未歸暮秋以為期良㑹詎幾日終日長相思戲贈張五弟諲吾弟東山時心尚一何逺日高猶自卧鐘動始能飯領上髮未梳牀頭書不巻清川興悠悠空林對偃蹇青苔石上淨細草松下軟牕外鳥聲閒階前虎心善徒然萬象多澹爾太虛緬一知與物平自顧為人淺對君忽自得浮念不煩遣奉寄韋太守陟荒城自蕭索萬里山河空天高秋日迥嘹唳聞歸鴻寒塘映衰草髙館落疎桐臨此嵗方晏顧景詠悲翁故人不可見寂寞平陵東和使君五郎西樓望逺思歸髙樓望所思極目情未畢枕上身十里牕中窺萬室悠悠長路人曖曖逺郊日惆悵極浦外迢遞孤烟出能賦屬上才思歸同下秩故鄉不可見雲水空如一送魏郡李太守赴任與君伯氏别又欲與君離君行無幾日當復隔山陂蒼茫秦川盡日落桃林塞獨樹臨闗門黄河向天外前經洛陽陌宛洛故人稀故人離别盡淇上轉驂騑企予悲送逺惆悵雎陽路古木官渡平秋城鄴宫故想君行縣日其出從如雲遥思魏公子復憶李將軍送宇文太守赴宣城寥落雲外山迢遥舟中賞鐃吹發西江秋空多清響地迥古城蕪月明寒潮廣時賽敬亭神復解罟師網何處寄相思南風吹五兩送别下馬飲君酒問君何所之君言不得意歸卧南山陲但去莫復問白雲無盡時濟州送祖三相逢方一笑相送還成泣祖帳已傷離荒城復愁入天寒逺山淨日暮長河急解纜君巳遥望君猶佇立送綦母濳落第還鄉聖代無隠者英靈盡來歸遂令東山客不得顧采薇既至君門逺孰云吾道非江淮度寒食京洛縫春衣置酒臨長道同心與我違行當逢桂棹未幾拂荆扉逺樹帶行客孤城當落暉吾謀適不用勿謂知音稀别弟縉後登青龍寺望藍田山陌上新别離蒼茫四郊晦登髙不見君故山復雲外逺樹蔽行人長天隠秋塞心悲宦遊子何處飛征葢藍田山石門精舍落日山水好漾舟信歸風探竒不覺逺因以緣源窮遥愛雲木秀初疑路不同安知清流轉偶與前山通捨舟理輕䇿果然愜所適老僧四五人逍遥蔭松栢朝梵林未曙夜禪山更寂道心及牧童世事問樵客暝宿長林下焚香卧瑶席澗芳襲人衣山月映石壁再尋畏迷誤明發更登厯笑謝桃源人花紅復來覿青谿言入黄花川毎逐青谿水隨山將萬轉趣途無百里聲喧亂石中色靜深松裏漾漾汎菱荇澄澄映葭葦我心素巳閒清川澹如此請留盤石上垂釣將巳矣崔濮陽兄季重前山興秋色有佳興况君池上閒悠悠西林下自識門前山千里横黛色數峰出雲間嵯峨對秦國合沓藏荆闗殘雨斜日照夕嵐飛鳥還故人今尚爾歎息此頽顏丁㝢田家有贈君心尚棲隠久欲傍歸路在朝毎為言解印果成趣晨雞鳴鄰里羣動從所務農夫行餉田閨妾起縫素開軒御衣服散帙理章句時吟招隠詩或製閒居賦新晴望郊郭日映桑榆暮陰盡小苑城微明渭川樹揆予宅閭井幽賞何由屢道存終不忘迹異難相遇此時惜離别再來芳菲度渭川田家斜陽照墟落窮巷牛羊歸野老念牧童倚杖候荆扉雉雊麥苗秀蠶眠桑葉稀田夫荷鋤至相見語依依即此羨閒逸悵然吟式微春中田園作屋上春鳩鳴村邊杏花白持斧伐逺揚荷鋤覘泉脈歸燕識故巢舊人看新厯臨觴忽不御惆悵逺行客過李揖宅閒門秋草色終日無車馬客來深巷中犬吠寒林下散髮時未簪道書行尚把與我同心人樂道安貧者一罷宜城酌還歸洛陽社宿鄭州朝與周人辭暮投鄭人宿他鄉絶儔侣孤客親僮僕宛洛望不見秋霖晦平陸田父草際歸村童雨中牧主人東臯上時稼遶茆屋蟲思機杼悲雀喧禾黍熟明當渡京水昨晩猶金谷此去欲何言窮邊徇微祿西施詠豔色天下重西施寧久微朝為越谿女暮作吳宫妃賤日豈殊衆貴來方悟稀邀人傅香粉不自著羅衣君寵益嬌態君憐無是非當時浣紗伴莫得同車歸持謝紀事作寄言鄰家子效顰安可希夷門歌七雄雄雌猶未分攻城殺將何紛紛秦兵益圍邯鄲急魏王不救平原君公子為嬴停駟馬執轡愈恭意愈下亥為屠肆鼔刀人嬴乃夷門抱闗者非但慷慨獻竒謀意氣兼將身命酬向風刎頸送公子七十老翁何所求隴頭吟長城少年游俠客夜上戍樓看太白隴頭明月迥臨闗隴上行人夜吹笛闗西老將不勝愁駐馬聽之雙淚流身經大小百餘戰麾下偏禆萬户侯蘇武纔為典屬國節旄空盡海西頭老將行少年十五二十時步行奪取胡馬騎射殺陰山白額虎肯數鄴下黄鬚兒一身轉戰三千里一劍曾當百萬師漢兵奮迅如霹靂虜騎崩騰畏蒺藜衞青不敗由天幸李廣無功緣數竒自從棄置便衰朽世事蹉跎成白首昔時飛雀無全目今日垂楊生左肘路傍時賣故侯𤓰門前學種先生柳蒼茫古木連窮巷寥落寒山對虛牖誓令疏勒出飛泉不似潁川空使酒賀蘭山下陣如雲羽檄交馳日夕聞節使三河募年少詔書五道出將軍試拂鐵衣如雪色聊持寳劍動星文願得燕弓射天將恥令越甲鳴吾君莫言舊日雲中守猶堪一戰立功勲桃源行漁舟逐水愛山深兩岸桃花夾去津坐看紅樹不知逺行盡青谿不見人山口潛行始隈隩山開曠望旋平陸遥看一處攢雲樹近入千家散花竹樵客初傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳靜日出雲中雞犬喧驚聞俗客爭來集競引還家問都邑平明閭巷掃花開薄暮漁樵乘水入初因避地去人間及至成仙遂不還峽裏誰知有人事世中遥望空雲山不疑靈境難聞見塵心未盡思鄉縣出洞無論隔山水辭家終擬長游衍自謂經過舊不迷安知峰壑今來變當時只記入山深青谿幾曲到雲林春來遍是桃花水不辨仙源何處㝷故人張諲工詩善易卜兼能丹青草隸頃以詩見贈聊獲酬之不逐城東遊俠兒隠囊紗帽坐彈棊蜀中夫子時開卦洛下書生解詠詩藥欄花逕衡門裏時復據梧聊隠几屏風誤㸃惑孫郎團扇草書輕内史故園髙枕度三春永日垂帷絶四鄰自惜蔡邕今巳老更將書籍與何人輞川閒居贈裴秀才迪寒山轉蒼翠秋水日潺湲倚杖柴門外臨風聽暮蟬渡頭餘落日墟里上孤烟復值接輿醉狂歌五柳前寄荆州張丞相所思竟何在悵望深荆門舉世無相識終身思舊恩方將與農圃藝植老丘園目盡南無鴈何由寄一言冬晩對雪憶胡居士家寒更傳曉箭清鏡覽衰顔隔牖風驚竹開門雪滿山灑空深巷靜積素廣庭閒借問袁安舍翛然尚閉闗酬虞部蘇員外過藍田别業不見留之作貧居依谷口喬木帶荒村石路枉迴駕山家誰候門漁舟膠凍浦獵火燒寒原唯有白雲外疎鐘聞夜猿酬張少府晩年唯好靜萬事不闗心自顧無長䇿空知返舊林松風吹解帶山月照彈琴君問窮通理漁歌入浦深送丘為落第歸江東憐君不得意况復柳條春為客黄金盡還家白髪新五湖三畝宅萬里一歸人知禰不能薦羞稱獻納臣送李判官赴江東聞道皇華使方隨皂蓋臣封章通左語冠冕化文身樹色分揚子潮聲滿富春遥知辨璧吏恩到泣珠人送岐州源長史歸握手一相送心悲安可論秋風正蕭索客散孟嘗門故驛通槐里長亭下槿原征西舊旌節從此向河源同崔興宗送衡嶽瑗公南歸言從石菌閣新下穆陵闗獨向池陽去白雲留故山綻衣秋日裏洗鉢古松間一施傳心法唯將戒定還送丘為往唐州宛洛有風塵君行多苦辛四愁連漢水百口寄隨人槐色陰清晝楊花惹暮春朝端肯相送天子繡衣臣送元中丞轉運江淮薄稅歸天府輕徭賴使臣歡霑賜帛老恩及巻綃人去問珠官俗來經石􅎕春東南御亭上莫使有風塵送崔九興宗遊蜀送君從此去轉覺故人稀徒御猶迴首田園方掩扉出門當旅食中路授寒衣江漢風流地遊人何嵗歸送平澹然判官不識陽闗路新從定逺侯黄雲斷春色畫角起邊愁瀚海經年到交河出塞流須令外國使知飲月氏頭送劉司直赴安西絶域陽闗道胡沙與塞塵三春時有鴈萬里少行人苜蓿隨天馬葡萄逐漢臣當令外國懼不敢覔和親送方城韋明府遥思葭菼際寥落楚人行高鳥長淮水平蕪故郢城使車聽雉乳縣鼔應雞鳴若見州從事無嫌手板迎送梓州李使君萬壑樹參天千山響杜鵑山中一夜雨樹杪百重泉漢女輸橦布巴人訟芋田文翁翻敎授不敢倚先賢送張五諲歸宣城五湖千萬里况復五湖西漁浦南陵郭人家春穀谿欲歸江淼淼未到草萋萋憶想蘭陵鎮可宜猿夜啼送人南歸萬里春應盡三江鴈亦稀連天漢水廣孤客郢城歸鄖國稻苗秀楚人菰米肥懸知倚門望遥識老萊衣送賀遂員外外甥南國有歸舟荆門泝上流蒼茫葭菼外雲水與昭丘檣帶城烏去江連暮雨愁猿聲不可聽莫待楚山秋送楊長史赴果州褎斜不容幰之子去何之鳥道一千里猿聲十二時官橋祭酒客山木女郎祠别後同明月君應聽子規送邢桂州鐃吹喧京口風波下洞庭赭圻將赤岸擊汰復揚舲日落江湖白潮來天地青明珠歸合浦應逐使臣星送孟六歸襄陽杜門不復出久與世情疎以此為長䇿勸君歸舊廬醉歌田舍酒笑讀古人書好是一生事無勞獻子虛登裴秀才迪小臺端居不出户滿目望雲山落日鳥邊下秋原人外閒遥知逺林際不見此簷間好客多乘月應門莫上闗過香積寺不知香積寺數里入雲峰古木無人逕深山何處鐘泉聲咽危石日色冷青松薄暮空潭曲安禪制毒龍過感化寺曇興上人山院暮持笻竹杖相待虎谿頭催客聞山響歸房逐水流野花叢發好谷鳥一聲幽夜坐空林寂松風直似秋登辨覺寺竹逕從初地蓮峰出化城牕中三楚盡林上九江平軟草乘趺坐長松響梵聲空居法雲外觀世得無生喜祖三至留宿門前洛陽客下馬拂征衣不枉故人駕平生多掩扉行人返深巷積雪帶餘暉早嵗同袍者髙車何處歸山居秋暝空山新雨後天氣晩來秋明月松間照清泉石上流竹喧歸浣女蓮動下漁舟隨意春芳歇王孫自可留終南别業中嵗頗好道晚家南山陲興來毎獨往勝事空自知行到水窮處坐看雲起時偶然值林叟談笑無還期歸嵩山作清川帶長薄車馬去閒閒流水如有意暮禽相與還荒城臨古渡落日滿秋山迢遞嵩髙下歸來且閉闗歸輞川作谷口疎鐘動漁樵稍欲稀悠然逺山暮獨向白雲歸菱蔓弱難定楊花輕易飛東臯春草色惆悵掩柴扉終南山太乙近天都連山到海隅白雲迴望合青靄入看無分野中峰變陰晴衆壑殊欲投人處宿隔水問樵夫觀獵風勁角弓鳴將軍獵渭城草枯鷹眼疾雪盡馬蹄輕忽過新豐市還歸細柳營迴看射鵰處千里暮雲平漢江臨汎楚塞三湘接荆門九派通江流天地外山色有無中郡邑浮前浦波瀾動逺空襄陽好風日留醉與山公登河北城樓作井邑傳巖上客亭雲霧間髙城眺落日極浦映蒼山岸火孤舟宿漁家夕鳥還寂寥天地暮心與廣川閒使至塞上單車欲問邊屬國過居延征蓬出漢塞歸鴈入胡天大漠孤烟直長河落日圓蕭闗逢候吏都䕶在燕然秋夜獨坐獨坐悲雙鬢空堂欲二更雨中山果落燈下草蟲鳴白髮終難變黄金不可成欲知除老病唯有學無生奉和聖製從蓬萊向興慶閣道中留春雨中春望之作應制渭水自縈秦塞曲黄山蒨遶漢宫斜鑾輿迥出仙門柳閣道迴看上苑花雲裏帝城雙鳳闕雨中春樹萬人家為乘陽氣行時令不是宸遊翫物華敕賜百官櫻桃芙蓉闕下㑹千官紫禁朱櫻出上䦨纔是寢園春薦後非闗御苑鳥銜殘歸鞍競帶青絲籠中使頻傾赤玉盤飽食不須愁内熱大官還有蔗漿寒敇借岐王九成宫避暑應敎帝子逺辭丹鳳闕天書遥借翠微宫隔牕雲霧生衣上巻幔山泉入鏡中林下水聲喧語笑巖間樹色隠房櫳仙家未必能勝此何事吹笙向碧空和太常韋主簿五郎温湯寓目之作漢主離宫接露臺秦川一半夕陽開青山盡是朱旗繞碧澗翻從玉殿來新豐樹裏行人度小苑城邊獵騎迴聞道甘泉能獻賦懸知獨有子雲才酬郭給事洞門髙閣靄餘輝桃李陰陰柳絮飛禁裏疎鐘官舍晚省中啼鳥吏人稀晨摇玉珮趨金殿夕奉天書拜瑣闈強欲從君無那老將因卧病解朝衣出塞作居延城外獵天驕白草連山野火燒暮雲空磧時驅馬秋日平原好射鵰䕶羌校尉朝乘障破虜將軍夜渡遼玉靶角弓朱勒馬漢家將賜霍嫖姚送楊少府貶郴州明到衡山與洞庭若為秋月聽猿聲愁看北渚三湘逺惡說南風五兩輕青草瘴時過夏口白頭浪裏出湓城長沙不久留才子賈誼何須弔屈平過乘如禪師蕭居士嵩丘蘭若無著天親弟與兄嵩丘蘭若一峰晴食隨鳴磬巢烏下行踏空林落葉聲逬水定侵香案濕雨花應共石牀平深洞長松何所有儼然天竺古先生春日與裴迪過新昌里訪吕逸人不遇桃源一向絶風塵柳市南頭訪隠淪到門不敢題凡鳥看竹何須問主人城上青山如屋裏東家流水入西鄰閉户著書多嵗月種松皆作老龍鱗酌酒與裴迪酌酒與君君自寛人情翻覆似波瀾白首相知猶按劍朱門先達笑彈冠草色全經細雨濕花枝欲動春風寒世事浮雲何足問不如髙卧且加餐積雨輞川莊作積雨空林烟火遲蒸藜炊黍餉東菑漠漠水田飛白鷺隂隂夏木囀黄鸝山中習靜觀朝槿松下清齋折露葵野老與人爭席罷海鷗何事更相疑送秘書晁監還日本積水不可極安知滄海東九州何處所萬里若乘空向國唯看日歸帆但信風鼇身映天黒魚眼射波紅鄉樹扶桑外主人孤島中别離方異域音信若為通送李太守赴上洛商山包楚鄧積翠靄沈沈驛路飛泉灑闗門落照深野花開古戍行客響空林板屋春多雨山城晝易陰丹泉通虢略白羽抵荆岑若見西山爽應知黄綺心曉行巴峽際曉投巴峽餘春憶帝京晴江一女浣朝日衆禽鳴水國舟中市山橋樹杪行登髙萬井出眺迥二流明人作殊方語鶯為故國聲賴多山水趣稍解别離情息夫人莫以今時寵能忘舊日恩看花滿眼淚不共楚王言班婕妤宫殿生秋草君王恩幸疎那堪聞鳳吹門外度金輿輞川集孟城坳新家孟城口古木餘衰柳來者復為誰空悲昔人有華子岡飛鳥去不窮連山復秋色上下華子岡惆悵情何極斤竹嶺檀欒映空曲青翠漾漣漪暗入商山路樵人不可知鹿柴空山不見人但聞人語響返景入深林復照青苔上木蘭柴秋山斂餘照飛鳥逐前侣彩翠時分明夕嵐無處所文杏館文杏裁為梁香茅結為宇不知棟裏雲去作人間雨宫槐陌仄逕蔭宫槐幽陰多綠苔譍門但迎掃畏有山僧來南垞輕舟南垞去北垞淼難即隔浦望人家遥遥不相識欹湖吹簫凌極浦日暮送夫君湖上一迴首青山巻白雲欒家瀨颯颯秋雨中淺淺石溜瀉跳波自相濺白鷺驚復下白石灘清淺白石灘綠蒲向堪把家住水東西浣紗明月下北垞北垞湖水北雜樹映朱欄逶迤南川水明滅青林端竹里館獨坐幽篁裏彈琴復長嘯深林人不知明月來相照辛夷塢木末芙蓉花山中發紅萼澗户寂無人紛紛開且落漆園古人非傲吏自闕經世務偶寄一微官婆娑數株樹皇甫嶽雲谿雜題鳥鳴磵人閒桂花落夜靜春山空月出驚山鳥時鳴春澗中鸕鷀堰乍向紅蓮没復出青蒲颺獨立何䙰褷銜魚古查上上平田朝耕上平田暮耕上平田借問問津者寧知沮溺賢萍池春池深且廣㑹待輕舟迴靡靡綠萍合垂楊掃復開答裴迪輞口遇雨憶終南山之作淼淼寒流廣蒼蒼秋雨晦君問終南山心知白雲外送别山中相送罷日暮掩柴扉春草年年綠王孫歸不歸臨髙臺送黎拾遺相送臨髙臺川原杳何極日暮飛鳥還行人去不息崔九弟欲往南山馬上口號與别城隅一分手幾日還相見山中有桂花莫待花如霰雜詩二首家住孟津河門對孟津口常有江南船寄書家中否君自故鄉來應知故鄉事來日綺牕前寒梅著花未相思紅豆生南國秋來發幾枝願君多采擷此物最相思哭孟浩然故人不可見漢水日東流借問襄陽老江山空蔡州少年行新豐美酒斗十千咸陽遊俠多少年相逢意氣為君飲繫馬髙樓垂柳邊一身能擘兩雕弧虜騎千重只似無偏坐金鞍調白羽紛紛射殺五單于九月九日憶山東兄弟獨在異鄉為異客毎逢佳節倍思親遥知兄弟登髙處遍插茱萸少一人送元二使安西渭城朝雨裛輕塵客舍青青柳色新勸君更盡一杯酒西出陽闗無故人送韋評事欲逐將軍取右賢沙場走馬向居延遥知漢使蕭闗外愁見孤城落日邊送沈子歸江東楊柳渡頭行客稀罟師盪槳向臨圻唯有相思似春色江南江北送君歸寒食汜上作廣武城邊逢暮春汶陽歸客淚沾巾落花寂寂啼山鳥楊柳青青渡水人王縉同王昌齡裴迪遊青龍寺曇璧上人兄院集和兄維林中空寂舍階下終南山髙卧一牀地迴看六合間浮雲幾處滅飛鳥何時還問義天人接無心世界閒誰知大隠者兄弟自追攀别輞川别業山月曉仍在林風凉不絶殷勤如有情惆悵令人别裴迪孟城坳結廬古城下時登古城上古城非疇昔今人自來往華子岡落日松風起還家草露晞雲光侵履跡山翠拂人衣斤竹嶺明流紆且直綠篠密復深一逕通山路行歌望舊岑鹿柴日夕見寒山便為獨往客不知深林事但有麏慶跡木蘭柴蒼蒼落日時鳥聲亂谿水緣谿路轉深幽興何時已茱萸沜飄香亂椒桂布葉間檀欒雲日雖迥照森沈猶自寒宫槐陌門前宫槐陌是向欹湖道秋來山雨多落葉無人掃南垞孤舟信一泊南垞湖水岸落日下崦嵫清波殊淼漫金屑泉縈渟澹不流金碧如可拾迎晨含素華獨往事朝汲白石灘跂石復臨水弄波情未極日下川上寒浮雲淡無色辛夷塢綠堤春草合王孫自留翫况有辛夷花色與芙蓉亂輞口遇雨憶終南山因獻王維積雨晦空曲平沙滅浮彩輞水去悠悠南山復何在崔九欲往南山馬上口號與别歸山深淺去須盡丘壑美莫學武陵人暫遊桃源裏崔興宗同王右丞送瑗公南歸行苦神亦秀泠然谿上松銅瓶與竹杖來自祝融峰常願入靈嶽藏經訪遺蹤南歸見長老且為說心胸留别王維駐馬欲分襟清寒御溝上前山景氣佳獨往還惆悵儲光羲泛茅山東谿清晨登仙峰峰逺行未極江海霽初景草木含新色而我任天和此時聊動息望鄉白雲裏發棹清谿側松栢生深山無心自貞直游茅山平生非作者望古懐清芬心以道為際行將時不羣兹山在人境靈貺久傳聞逺勢一峰出近形千嶂分冬春有茂草朝暮多鮮雲此去亦何極但言西日曛昔賢居柱下今我去人間良以直心曠兼之外視閒垂綸非釣國好學異希顏落日登高嶼悠然望逺山谿流碧水去雲帶清陰還想見中林士巖扉長不闗名嶽徴仙事清都訪道書山門入松栢天路涵空虛南極見朝采西潭聞夜漁逺心尚雲宿浪跡出林居為己存實際忘形同化初此行良巳矣不樂復何如夜到洛口入黄河河洲多青草朝暮增客愁客愁惜朝暮枉渚暫停舟中宵大川靜解纜逐歸流浦漵既清曠沿洄非阻脩登艫望落月擊汰悲新秋倘遇乘槎客永言星漢遊泊舟貽潘少府行子苦風潮維舟未能發宵分巻前幔卧視清秋月四澤葭葦深中洲煙火絶蒼蒼水霧起落落疎星没所遇盡漁商與言多楚越其如念極浦又以思明哲常若千里餘況之異鄉别終南幽居獻蘇侍郎中嵗尚微道始知將谷神抗䇿還南山水木自相親深林開一道青嶂成四鄰平明去采薇日入行刈薪雲歸萬壑暗雪罷千巗春始看𤣥鳥來巳見瑶華新寄言搴芳者無乃後時人酬綦毋校書夢邪溪見贈之作校文在仙掖每有滄洲心况以北牕下夢遊清溪陰春看湖水漫夜入迴塘深往往纜垂葛出舟望前林山人松下飯釣客蘆中吟小隠何足貴長年固可尋還車首東道惠言若黄金以我采薇意傳之天姥岑登戲馬臺作君不見宋公杖鉞誅燕後英雄踴躍爭趨走小㑹衣冠吕梁壑大徵甲卒碻磝口天開神武樹元勲九日茱萸饗六軍泛泛樓船遊極浦揺揺歌吹動浮雲居人滿目市朝變霸業猶存齊楚甸泗水南浮桐栢川沂山北走瑯琊縣滄海沈沈晨霧開彭城烈烈秋風來少年自言未得意日暮蕭條登古臺霽後貽馬十二巽高天風雨散清氣在園林况我夜初靜當軒鳴綠琴雲開北堂月庭滿南山陰不見長裾者空歌遊子吟題陸山人樓暮聲雜初雁夜色涵早秋獨見海中月照君池上樓山雲拂髙棟天漢入雲流不惜朝光滿其如千里遊寒夜江口泊舟寒潮信未起出浦纜孤舟一夜苦風浪自然增旅愁吳山遲海月楚火照江流欲有知音者異鄉誰可求尋徐山人遇馬舍人泊舟伊川右正見野人歸日暮春山綠我心清且微巗聲風雨度水氣雲霞飛復有金門客來參蘿薜衣寄孫山人新林二月孤舟還水滿清江花滿山借問故園隠君子時時來往在人間丘為尋西山隠者不遇絶頂一茅茨直上三十里扣闗無僮僕窺室唯案几若非巾柴車應是釣秋水差池不相見黽俛空仰止草色新雨中松聲晩牕裏及兹契幽絶自足蕩心耳雖無賔主意頗得清淨理興盡方下山何必待之子題農舍東風何時至巳綠湖上山湖上春既早田家日不閒溝塍流水處耒耜平蕪間薄暮飯牛罷歸來還閉闗留别王維歸鞍白雲外繚繞出前山今日又明日自知心不閒親勞簪組送欲趂鶯花還一步一回首遲遲向近闗左掖梨花冷艷全欺雪餘香乍入衣春風且莫定吹向玉階飛祖詠歸汝墳山莊留别盧象淹留嵗將晏久廢南山期舊業不見棄還山從此辭漚麻入南澗刈麥向東菑對酒雞黍熟閉門風雪時非君一延首誰慰遥相思夕次圃田店前路入鄭郊尚經百餘里馬煩時欲歇客歸程未巳落日桑柘陰遥村烟火起西還不遑宿中夜渡涇水田家即事舊居東皋上左右俯荒村樵路前傍嶺田家遥對門歡娛始披拂愜意在郊原餘霽蕩川霧新秋仍晝昬攀條憩林麓引水開泉源稼穡豈云倦桑麻今正繁方求靜者賞偶與潛夫論雞黍何必具吾心知道尊長樂驛留别盧象裴總朝來巳握手宿别更傷心灞水行人渡商山驛路深故情君且足謫宦我難任直道皆如此誰能淚滿襟蘇氏别業别業居幽處到來生隠心南山當户牖灃水在園林竹覆經冬雪庭昬未夕陰寥寥人境外閒坐聽春禽題韓少府水亭梅福幽棲處佳期不忘還鳥啼當户竹花繞傍池山水氣侵堦冷藤陰覆座閒寧知武陵趣宛在市朝間望薊門燕臺一望客心驚簫鼓喧喧漢將營萬里寒光生積雪三邊曙色動危旌沙場烽火連胡月海畔雲山擁薊城少小雖非投筆吏論功還欲請長纓家園夜坐寄郭微前堦微雨歇開户散窺林月出夜方淺水凉池更深餘風生竹樹清露薄衣襟遇物遂遥歎懐人滋逺心依稀成夢想影響絶徽音誰念窮居者明時嗟陸沈終南望餘雪終南陰嶺秀積雪浮雲端林表明霽色城中增暮寒盧象家叔徵君東谿草堂開山十餘里青壁森相倚欲識堯時天東谿白雲是雷聲轉幽壑雲氣香流水澗影生龍蛇巗端翳檉梓大道終不易君恩曷能巳鶴羨無老時龜言攝生理浮年笑六甲元化潛一指未暇掃雲梯空慙阮家子送祖詠田家宜伏臘嵗晏子言歸石路雪初下荒村雞共飛東野多烟火北澗隠寒暉滿酌野人酒倦聞鄰女機胡為困樵采幾日罷朝衣寄河上段十六與君相識即相親聞道君家住孟津為見行舟試借問客中時有洛陽人殷遥山行寂歴青山曉山行趣不稀野花成子落江燕引雛飛暗草薰苔徑晴楊掃石磯俗人猶語此余亦轉忘歸唐賢三昧集巻上
